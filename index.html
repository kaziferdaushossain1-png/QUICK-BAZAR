<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কুইক বাজার - দ্রুত ও সহজ কেনাকাটা</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f0f2f5; text-align: center; color: #1c1e21; }
        header { background: #ff4757; color: white; padding: 25px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1000px; margin: 20px auto; padding: 10px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .price { color: #2ed573; font-size: 20px; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; font-size: 14px; cursor: pointer; }
        .wa-btn { background: #25D366; color: white; }
        .bk-btn { background: #d7011d; color: white; }
        footer { padding: 20px; color: #777; background: #fff; border-top: 1px solid #ddd; margin-top: 30px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">🛒 কুইক বাজার (Quick Bazar)</h1>
    <p style="margin:5px 0 0;">আপনার বিশ্বস্ত অনলাইন শপ</p>
</header>

<div class="container">
    <div class="product-grid">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Product" style="width:100%; border-radius:10px;">
            <h3>প্রিমিয়াম লিপস্টিক</h3>
            <p class="price">৳ ৩৫০</p>
            <a href="https://wa.me/8801700000000" class="btn wa-btn">WhatsApp অর্ডার</a>
            <button class="btn bk-btn">বিকাশ পেমেন্ট</button>
        </div>
        
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Product" style="width:100%; border-radius:10px;">
            <h3>স্মার্ট ওয়াচ</h3>
            <p class="price">৳ ২,৫০০</p>
            <a href="https://wa.me/8801700000000" class="btn wa-btn">WhatsApp অর্ডার</a>
            <button class="btn bk-btn">বিকাশ পেমেন্ট</button>
        </div>
    </div>
</div>

<footer>
    <p>&copy; ২০২৬ কুইক বাজার | সর্বস্বত্ব সংরক্ষিত</p>
</footer>

</body>
</html>
